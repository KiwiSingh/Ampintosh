# Ampintosh for Nintendo Switch
# Copy this file to either:
#   sdmc:/switch/Ampintosh/ampintosh.ini
#   sdmc:/ampintosh/ampintosh.ini
#   sdmc:/ampintosh.ini
#
# Paths may be SD paths (sdmc:/...), explicit USB mount paths (ums0:/...),
# or the USB wildcard alias below (usb:/...), which expands to every mounted
# libusbhsfs USB volume when built with USB=1.
#
# Decoder-backed playback in this Switch build:
#   MP3, FLAC, WAV/WAVE, AIFF/AIFC PCM, plus M3U/M3U8 playlists that point at those files.
# UTF-8/Japanese filenames are supported; ordinary ASCII extensions are detected
# even after names with kana/kanji/〜, and fullwidth dots like 曲名．wav are accepted.
#
# NXMP-style [Main] keys are accepted where they make sense. `enabled_extensions`
# is parsed, but Ampintosh still only shows/queues decoder-backed audio files so
# it does not pretend to play AAC/ALAC/Opus/Vorbis/etc. without real decoders.

[Main]
startpath = sdmc:/music
enabled_extensions = .mp3,.flac,.wav,.wave,.aif,.aiff,.aifc,.m3u,.m3u8
showhidden = false

[library]
recursive = true
max_depth = 8
max_tracks = 4096
music_dir = sdmc:/ampintosh
music_dir = sdmc:/music
music_dir = usb:/ampintosh
music_dir = usb:/music
music_dir = usb:/Music

[usb]
enabled = true
# Give libusbhsfs' background thread a moment to mount already-attached drives.
wait_ms = 1400

[network]
enabled = true
timeout_sec = 25
# Async SMB streaming uses a background decoder/prefetch thread, so playback starts
# after a bounded 10% prebuffer instead of waiting for the full file to cache.
# Set false to force old full-cache-first SMB playback.
smb_streaming = true
smb_stream_prebuffer_percent = 10
# Buffering is shown in the player UI while this fills.
smb_stream_prebuffer_max_ms = 15000
smb_stream_buffer_ms = 45000
# HTTP/SFTP, SMB AIFF, and unsupported remote formats use this cache.
cache_dir = sdmc:/ampintosh
stream_list = sdmc:/ampintosh/streams.txt
stream_list = usb:/ampintosh/streams.txt
# You can also add direct one-off URLs here:
# stream_url = https://example.com/song.mp3
# stream_url = sftp://user:password@example.com:22/path/song.flac

# NXMP-style network bookmarks are also understood. Section names become the
# Network menu labels. Direct file targets can be played through libcurl. When the optional
# libssh2/libsmb2 portlibs are installed, SMB/SFTP folders are browsable from
# the Network menu like NXMP-style bookmarks.
#
# [NAS Music]
# server = 192.168.1.14
# type = smb
# username = parthasarathi
# password = your_password_here
# port = 445
# path = Music
#
# [SFTP Music]
# server = example.com
# type = sftp
# username = user
# password = your_password_here
# port = 22
# path = /home/user/Music

[playback]
# Default is intentionally paused. Press B to choose/play from the browser.
autoplay = false
# shuffle, repeat_one, repeat_all
mode = shuffle

[ui]
# spectrum, mirror, scope, fractal, orbit, rings, tunnel, radial, lissajous,
# bloom, particles, matrix
visualizer = fractal
# ampintosh, fruit_studio, live_session, orange_black, digital_tamer,
# octohub, space_cowboy, music_glass
skin = ampintosh

[lastfm]
# Optional Last.fm scrobbling. Create an API account/key at Last.fm, then
# generate a session key (`sk`) once on desktop and paste it here. Ampintosh
# signs updateNowPlaying/scrobble calls locally with api_secret.
enabled = false
api_key =
api_secret =
session_key =
now_playing = true
scrobble = true
scrobble_percent = 50
min_seconds = 30
# Used only when artist cannot be inferred from the folder path.
default_artist =
